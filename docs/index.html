// 图表库：TradingView lightweight-charts（券商级移动端手势）

var t=document.createElement("script");t.src=srcs[i];
t.onerror=function(){load(srcs,i+1)};document.head.appendChild(t);})(
["https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js",
"https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"],0);

const UP="#d93025",DN="#188038",
  MAS=[[5,"#f0a30a"],[10,"#2563eb"],[20,"#9333ea"],[30,"#10b981"],[60,"#64748b"]];
const DARK=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches;
function initCharts(tries){
  if(!window.LightweightCharts){
    if(tries<20)setTimeout(()=>initCharts(tries+1),400);return;}
  const el=document.getElementById("kdata");if(!el)return;
  const data=JSON.parse(el.textContent);
  // 卡片/机会/「查看K线」点击 → 吊起底部 K线浮层
  window._kdata=data;
  const mel=document.getElementById("kmeta");
  window._kmeta=mel?JSON.parse(mel.textContent):{};
  document.querySelectorAll("[data-k]").forEach(t=>{
    t.style.cursor="pointer";
    t.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();
      openSheet(t.getAttribute("data-k"));});
  });
  const _wrap=document.getElementById("ksheet");
  if(_wrap){
    _wrap.querySelector(".ksheet-backdrop").addEventListener("click",closeSheet);
    document.getElementById("ks-close").addEventListener("click",closeSheet);
    const _sc=_wrap.querySelector(".ksheet");let _sy=null,_dy=0;
    _sc.addEventListener("touchstart",e=>{if(_sc.scrollTop<=0){
      _sy=e.touches[0].clientY;_dy=0;_sc.style.transition="none";}},{passive:true});
    _sc.addEventListener("touchmove",e=>{if(_sy==null)return;
      _dy=e.touches[0].clientY-_sy;if(_dy>0)_sc.style.transform="translateY("+_dy+"px)";},{passive:true});
    _sc.addEventListener("touchend",()=>{if(_sy==null)return;
      _sc.style.transition="";_sc.style.transform="";if(_dy>90)closeSheet();_sy=null;});
  }
}
let _curChart=null;
function openSheet(key){
  const data=window._kdata;if(!data||!data[key])return;
  const m=(window._kmeta||{})[key]||{};
  document.getElementById("ks-name").textContent=key;
  document.getElementById("ks-code").textContent=m.code||"";
  document.getElementById("ks-stat").innerHTML=m.stat||"";
  const div=document.getElementById("ks-chart"),info=document.getElementById("ks-info");
  div.innerHTML="";info.innerHTML="";
  if(_curChart){try{_curChart.remove();}catch(e){}_curChart=null;}
  const wrap=document.getElementById("ksheet");
  wrap.hidden=false;document.body.style.overflow="hidden";
  requestAnimationFrame(()=>{wrap.classList.add("open");
    requestAnimationFrame(()=>{if(window.LightweightCharts)
      _curChart=buildChart(div,info,data[key]);});});
}
function closeSheet(){
  const wrap=document.getElementById("ksheet");if(!wrap)return;
  wrap.classList.remove("open");document.body.style.overflow="";
  setTimeout(()=>{wrap.hidden=true;
    if(_curChart){try{_curChart.remove();}catch(e){}_curChart=null;}
    document.getElementById("ks-chart").innerHTML="";},280);
}
function buildChart(div,info,entry){
      const bars=entry.bars;
      const iso=s=>s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8);
      const closes=bars.map(b=>b[4]);
      const ma=p=>closes.map((_,i)=>i<p-1?null:
        +(closes.slice(i-p+1,i+1).reduce((a,c)=>a+c,0)/p).toFixed(2));
      const mas=MAS.map(([p,c])=>[p,c,ma(p)]);
      const idxOf={};bars.forEach((b,i)=>idxOf[iso(b[0])]=i);

      const H=div.clientHeight||320;
      const chart=LightweightCharts.createChart(div,{
        height:H,width:div.clientWidth,
        layout:{background:{color:"transparent"},
          textColor:DARK?"#8b929b":"#7c828a",fontSize:10},
        grid:{vertLines:{visible:false},
          horzLines:{color:DARK?"#2a2e33":"#eceef0"}},
        rightPriceScale:{borderVisible:false},
        timeScale:{borderVisible:false,fixRightEdge:true},
        crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
        // 关键手势设定：竖向滑动放行给页面滚动，横滑平移、双指缩放
        handleScroll:{vertTouchDrag:false,mouseWheel:false,
          pressedMouseMove:true,horzTouchDrag:true},
        handleScale:{pinch:true,mouseWheel:true,
          axisPressedMouseMove:false}});
      const candle=chart.addCandlestickSeries({upColor:UP,downColor:DN,
        borderUpColor:UP,borderDownColor:DN,wickUpColor:UP,wickDownColor:DN});
      candle.setData(bars.map(b=>({time:iso(b[0]),
        open:b[1],high:b[2],low:b[3],close:b[4]})));
      mas.forEach(([p,c,arr])=>{
        chart.addLineSeries({color:c,lineWidth:1,priceLineVisible:false,
          lastValueVisible:false,crosshairMarkerVisible:false})
        .setData(bars.map((b,i)=>arr[i]==null?null:
          ({time:iso(b[0]),value:arr[i]})).filter(x=>x));});
      const volS=chart.addHistogramSeries({priceScaleId:"vol",
        priceFormat:{type:"volume"},lastValueVisible:false,
        priceLineVisible:false});
      chart.priceScale("vol").applyOptions(
        {scaleMargins:{top:.82,bottom:0}});
      volS.setData(bars.map(b=>({time:iso(b[0]),value:b[5],
        color:(b[4]>=b[1]?UP:DN)+"66"})));

      // 标注：金叉▲/死叉▼（策略信号，弱化为小箭头）
      const marks=[];
      [[5,20],[10,30],[20,60]].forEach(([a,b])=>{
        const s=ma(a),l=ma(b);
        for(let i=1;i<bars.length;i++){
          if(s[i-1]==null||l[i-1]==null)continue;
          const d0=s[i-1]-l[i-1],d1=s[i]-l[i];
          if(d0<=0&&d1>0)marks.push({time:iso(bars[i][0]),
            position:"belowBar",shape:"arrowUp",color:UP+"99",
            text:"金"+a+"/"+b});
          else if(d0>=0&&d1<0)marks.push({time:iso(bars[i][0]),
            position:"aboveBar",shape:"arrowDown",color:DN+"99",
            text:"死"+a+"/"+b});}});
      // 买卖动作：同日多笔合并为一个标记（成交量加权均价），避免标签重叠
      const byDay={};
      (entry.trades||[]).forEach(t=>{
        if(idxOf[iso(t[0])]==null)return;
        const k=t[0]+t[1]+t[4];
        const g=byDay[k]||(byDay[k]={d:t[0],act:t[1],src:t[4],amt:0,sh:0});
        g.amt+=t[2]*t[3];g.sh+=t[3];});
      const tradeInfo={};  // 日期->成交详情（供信息栏显示）
      Object.values(byDay).forEach(g=>{
        const avg=(g.amt/g.sh);
        marks.push({time:iso(g.d),
          position:g.act==="B"?"belowBar":"aboveBar",
          shape:g.act==="B"?"arrowUp":"arrowDown",size:2,
          color:g.act==="B"?"#2563eb":"#f59e0b",
          text:(g.src==="模拟"?"模":"")+g.act});
        tradeInfo[iso(g.d)]=(tradeInfo[iso(g.d)]||[]).concat(
          [`${g.src==="模拟"?"模拟":""}${g.act==="B"?"买入":"卖出"} `+
           `${g.sh}股 @${avg.toFixed(2)}`]);});
      marks.sort((x,y)=>x.time<y.time?-1:1);
      candle.setMarkers(marks);

      // 成本线：持仓股画一条水平虚线标注平均成本（盈亏一眼可见）
      if(entry.cost){
        const last=bars[bars.length-1][4];
        candle.createPriceLine({price:entry.cost,
          color:last>=entry.cost?UP:DN,lineWidth:1,lineStyle:2,
          axisLabelVisible:true,title:"成本 "+entry.cost});
      }


      // 顶部信息栏：随十字光标实时刷新（券商式）
      const fmt=i=>{
        const b=bars[i],pv=i>0?bars[i-1][4]:b[1];
        const chg=((b[4]/pv-1)*100).toFixed(2);
        const cc=b[4]>=pv?UP:DN;
        let t=`<b>${iso(b[0])}</b>  开${b[1]} 高${b[2]} 低${b[3]} `+
          `收<b style="color:${cc}">${b[4]}</b> `+
          `<span style="color:${cc}">${chg}%</span><br>`;
        t+=mas.map(([p,c,arr])=>arr[i]==null?"":
          `<span style="color:${c}">MA${p} ${arr[i]}</span>`)
          .filter(x=>x).join(" ");
        // 当日有买卖动作则在信息栏高亮显示成交详情
        const ti=tradeInfo[iso(b[0])];
        if(ti)t+=`<br><b style="color:#2563eb">▸ ${ti.join("，")}</b>`;
        return t;};
      info.innerHTML=fmt(bars.length-1);
      chart.subscribeCrosshairMove(pr=>{
        const i=pr&&pr.time!=null?idxOf[typeof pr.time==="string"?pr.time:
          pr.time.year+"-"+String(pr.time.month).padStart(2,"0")+"-"+
          String(pr.time.day).padStart(2,"0")]:null;
        info.innerHTML=fmt(i!=null?i:bars.length-1);});

      chart.timeScale().setVisibleLogicalRange(
        {from:Math.max(0,bars.length-90),to:bars.length});
      new ResizeObserver(()=>chart.applyOptions(
        {width:div.clientWidth,height:div.clientHeight||H})).observe(div);
      return chart;
}
// 账户 tab 切换（真实 / 模拟）
function setupTabs(){
  const tabs=document.querySelectorAll(".tab");if(!tabs.length)return;
  tabs.forEach(b=>b.addEventListener("click",()=>{
    tabs.forEach(x=>x.classList.remove("on"));b.classList.add("on");
    const t=b.getAttribute("data-tab");
    const r=document.getElementById("tabreal"),p=document.getElementById("tabpaper");
    if(r)r.classList.toggle("tabhide",t!=="real");
    if(p)p.classList.toggle("tabhide",t!=="paper");
    window.scrollTo(0,0);}));
}

const u=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),
    "PBKDF2",false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:u(SALT),
    iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u(IV)},k,u(CT));
  return new TextDecoder().decode(pt);}
async function go(){
  const pw=document.getElementById("pw").value;
  try{
    const html=await dec(pw);
    if(document.getElementById("rem").checked)localStorage.setItem("dp",pw);
    document.body.innerHTML=html;document.body.style.display="block";
    window.scrollTo(0,0);initCharts(0);setupTabs();
  }catch(e){document.getElementById("err").textContent="密码不对，再试试";
    localStorage.removeItem("dp");}}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
const saved=localStorage.getItem("dp");
if(saved){document.getElementById("pw").value=saved;go();}
</script></body></html>
