const enc=new TextEncoder(),dec=new TextDecoder();
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function go(){
  const pw=document.getElementById("pw").value;
  try{
    const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const html=dec.decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct)));
    if(document.getElementById("rem").checked)localStorage.setItem("dash_pw",pw);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById("err").textContent="密码错误";}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
const saved=localStorage.getItem("dash_pw");if(saved){document.getElementById("pw").value=saved;go();}
</script></body></html>
